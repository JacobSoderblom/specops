# specops configuration
# This file defines your project's agent governance structure.
# Run `specops update` after editing to regenerate managed files.
# Generated by `specops init` or `/specops:scan`.

# ---------------------------------------------------------------------------
# Project metadata
# Required. Shown in CLAUDE.md and agent context docs.
# ---------------------------------------------------------------------------
project:
  # Display name of the project. Used in generated docs.
  name: "{{projectName}}"
  # One-line description of what this project does.
  description: "{{projectDescription}}"
  # Optional link to the repository. Shown in CLAUDE.md.
  # repository: https://github.com/org/repo

# ---------------------------------------------------------------------------
# Technology stack
# Tells agents what they are working with. Used in CLAUDE.md and escalation
# rule generation. Only list what is actually in use — do not guess.
# ---------------------------------------------------------------------------
stack:
  # Programming languages in use (e.g., TypeScript, Rust, Python, Go, Java).
  languages:
    - TypeScript
  # Web/app/service frameworks (e.g., React, Next.js, Axum, FastAPI, NestJS).
  frameworks:
    - React
  # Databases and storage systems (e.g., PostgreSQL, Redis, MongoDB, SQLite).
  databases:
    - PostgreSQL
  # Infrastructure and operational tooling (e.g., Docker, Kubernetes, AWS, Fly).
  infrastructure:
    - Docker

# ---------------------------------------------------------------------------
# Agent roles
# Define who does what. Ordered by authority — the FIRST role listed has
# the highest authority for ambiguous decisions. Each role needs:
#   name        — shown in docs and CLAUDE.md (e.g., "Backend Architect")
#   authority   — comma-separated domains this role owns
#   description — one-line summary of what this role does
# ---------------------------------------------------------------------------
agents:
  roles:
    - name: Backend Architect
      authority: system-design, api-contracts, data-models
      description: Designs backend systems and produces authoritative implementation plans
    - name: Frontend Developer
      authority: ui-implementation, component-design, state-management
      description: Implements UI components and consumes API contracts
    - name: DevOps Automator
      authority: ci-cd, deployment, infrastructure
      description: Manages CI/CD pipelines, deployment, and infrastructure
    - name: Staff Engineer
      authority: code-review, quality, risk-assessment
      description: Reviews plans and code for quality, risk, and architectural alignment

# ---------------------------------------------------------------------------
# Escalation rules
# Explicit triggers for when agents must STOP and ask a human.
# Customize triggers for your stack — the scan skill tailors these based on
# what it finds (e.g., Rust projects get unsafe-code rules, database projects
# get migration rules, etc.).
# ---------------------------------------------------------------------------
escalation:
  categories:
    # Architectural changes that could affect the whole system.
    - name: Architecture and Design
      triggers:
        - Introducing new components or service boundaries
        - Changing API contracts or data models
        - Modifying component responsibilities
        - Architectural decision not covered by existing docs
    # Security-sensitive changes that could expose data or credentials.
    - name: Security and Data
      triggers:
        - Modifying authentication or authorization boundaries
        - Changing how secrets or credentials are handled
        - Modifying database schemas without a migration strategy
    # Changes that break backwards compatibility for consumers.
    - name: Breaking Changes
      triggers:
        - Breaking any public API (REST, GraphQL, WebSocket, events)
        - Removing or renaming public interfaces
        - Breaking backward compatibility without a deprecation plan
    # Changes that affect how the system runs in production.
    - name: Operational Impact
      triggers:
        - Changing deployment topology or infrastructure requirements
        - Modifying observability or logging semantics
        - Changes that could impact system reliability
    # Quality issues that indicate something is being done incorrectly.
    - name: Code Quality
      triggers:
        - Duplicating code that should be shared
        - Test failures you do not understand
        - Disabling or skipping tests
        - Working around existing abstractions instead of using them

# ---------------------------------------------------------------------------
# Documentation authority hierarchy
# When docs conflict, higher-ranked layers win. Listed highest authority first.
# Agents use this to resolve ambiguity deterministically rather than guessing.
# Only include layers that actually exist in your project.
# ---------------------------------------------------------------------------
docHierarchy:
  layers:
    # Primary architecture doc — component boundaries and responsibilities.
    - path: docs/architecture.md
      description: System architecture and component boundaries
    # API contract definitions — REST routes, GraphQL schema, event schemas.
    - path: docs/api-contracts.md
      description: API contracts and schemas
    # Historical architectural decisions with rationale.
    - path: "docs/adr/*.md"
      description: Architecture Decision Records
    # The current implementation is always ground truth.
    - path: Code and tests
      description: Ground truth for current implementation
    # Implementation details for individual components.
    - path: Component READMEs
      description: Implementation details

# ---------------------------------------------------------------------------
# Architecture components (optional but recommended for larger projects)
# Define component responsibility boundaries so agents know where code belongs.
# Map these from your actual directory structure. If a single-file script,
# omit this section entirely.
#
# Each component has:
#   name   — identifier matching a directory or conceptual boundary
#   owns   — what this component is responsible for (be specific)
#   avoids — what this component must NOT do (enforces separation of concerns)
# ---------------------------------------------------------------------------
# architecture:
#   principles:
#     - Parse at boundaries, validate with types not runtime checks
#     - Enforce invariants mechanically (lints, tests), not via docs alone
#   components:
#     - name: api-server
#       owns:
#         - HTTP routing and middleware
#         - Authentication and authorization
#         - Request validation
#       avoids:
#         - Business logic (belongs in domain layer)
#         - Direct database queries (use repository layer)
#     - name: domain
#       owns:
#         - Business rules and invariants
#         - Domain models and value objects
#       avoids:
#         - HTTP concerns
#         - Database implementation details

# ---------------------------------------------------------------------------
# Skills
# Domain-specific workflow instructions agents load on demand.
# Each skill listed here becomes .claude/skills/<name>/SKILL.md.
# The specops-scan skill is always included automatically — no need to list it.
#
# Each skill needs:
#   name        — directory name and slash-command identifier (kebab-case)
#   description — shown in CLAUDE.md skill table
#   whenToUse   — one-line trigger for when to invoke this skill
# ---------------------------------------------------------------------------
skills:
  skills:
    - name: backend-workflows
      description: Common backend development workflows
      whenToUse: Adding migrations, API endpoints, bus events, or writing tests
    - name: frontend-workflows
      description: Common frontend development workflows
      whenToUse: Adding routes, components, API integrations, or state management

# ---------------------------------------------------------------------------
# Resources
# Links shown in CLAUDE.md for quick navigation. Group related links under
# named sections. Paths are relative to the project root.
# ---------------------------------------------------------------------------
resources:
  sections:
    - name: Development
      links:
        - label: Setup guide
          path: README.md
    - name: Operations
      links:
        - label: Deployment
          path: docs/deployment.md

# ---------------------------------------------------------------------------
# Design principles (optional)
# Project-wide principles shown prominently in CLAUDE.md. Infer from README,
# CONTRIBUTING.md, or existing architecture docs. These guide agent behavior
# when the rules don't explicitly cover a situation.
# ---------------------------------------------------------------------------
# principles:
#   items:
#     - Repository knowledge is the system of record
#     - Enforce invariants mechanically, not via docs alone
#     - Semantic file organization (many small well-scoped files)
#     - Parse at boundaries, validate with types not runtime checks
